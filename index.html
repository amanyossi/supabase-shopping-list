<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת קניות - סנכרון חי</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* עיצוב כללי */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 40px; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            direction: rtl; 
        }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        h1 { text-align: center; color: #1c1e21; margin-bottom: 25px; }

        /* אזור הקלט */
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        
        input { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: border-color 0.3s;
        }
        
        input:focus { border-color: #28a745; outline: none; }

        /* כפתורים */
        .add-btn { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s; /* אפקט מעבר חלק */
        }
        
        .add-btn:hover { background: #218838; } /* צבע כהה יותר במעבר עכבר */

        .delete-btn { 
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: opacity 0.3s;
        }
        
        .delete-btn:hover { opacity: 0.8; }

        /* רשימת הפריטים */
        ul { list-style: none; padding: 0; margin: 0; }
        
        li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fff; 
            padding: 15px; 
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        li:hover { background: #fafafa; }

        .item-text { 
            flex: 1; 
            cursor: pointer; 
            font-size: 18px; 
            transition: color 0.2s;
        }
        
        .item-text:hover { color: #007bff; }

        .in-cart { 
            text-decoration: line-through !important; 
            color: #888 !important; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>סל הקניות שלי</h1>
    <div class="input-group">
        <input type="text" id="item-input" placeholder="מה להוסיף לסל?" autocomplete="off">
        <button class="add-btn" onclick="addItem()">הוסף</button>
    </div>
    <ul id="shopping-list"></ul>
</div>

<script>
    (function() {
        // הגדרות Supabase - ה-URL והמפתח שלך
        const SB_URL = 'https://mbphwmslltiuorovubvu.supabase.co';
        const SB_KEY = 'sb_publishable_H7uKfsx_Gk21oMpbcA0vlw_wAw1es2t';
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        // 1. פונקציה לטעינת הנתונים מהשרת
        window.loadItems = async function() {
            const { data, error } = await supabaseClient
                .from('shopping_items')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error loading items:", error);
                return;
            }

            const listElement = document.getElementById('shopping-list');
            listElement.innerHTML = ''; 

            data.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="item-text ${item.is_in_cart ? 'in-cart' : ''}" 
                          onclick="toggleStatus('${item.id}', ${item.is_in_cart})">
                        ${item.item_name}
                    </span>
                    <button class="delete-btn" onclick="deleteItem('${item.id}')">מחק</button>
                `;
                listElement.appendChild(li);
            });
        };

        // 2. הגדרת Realtime - עדכון חי ללא רענון דף
        function setupRealtime() {
            supabaseClient
                .channel('public:shopping_items') 
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'shopping_items' }, 
                    (payload) => {
                        console.log('שינוי זוהה בבסיס הנתונים!', payload);
                        loadItems(); 
                    }
                )
                .subscribe();
        }

        // 3. הוספת פריט חדש
        window.addItem = async function() {
            const input = document.getElementById('item-input');
            const name = input.value.trim();
            if (!name) return;
            
            const { error } = await supabaseClient
                .from('shopping_items')
                .insert([{ item_name: name, is_in_cart: false }]);
            
            if (error) alert("שגיאה בהוספה: וודא שפוליסת RLS מוגדרת.");
            input.value = '';
        };

        // 4. שינוי סטטוס (נקנה / לא נקנה)
        window.toggleStatus = async function(id, currentStatus) {
            await supabaseClient
                .from('shopping_items')
                .update({ is_in_cart: !currentStatus })
                .eq('id', id);
        };

        // 5. מחיקת פריט
        window.deleteItem = async function(id) {
            if (!confirm("למחוק את הפריט?")) return;
            await supabaseClient
                .from('shopping_items')
                .delete()
                .eq('id', id);
        };

        // האזנה למקש Enter בתיבת הטקסט
        document.getElementById('item-input').onkeypress = (e) => { 
            if (e.key === 'Enter') addItem(); 
        };

        // הפעלה ראשונית
        loadItems();
        setupRealtime();
    })();
</script>
</body>
</html>
